name: CI
permissions:
  contents: read
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  merge_group:
  pull_request:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated check attrs to build across supported runners"
        required: false
        default: ""
      buildAllPackages:
        description: "Build all check attrs on supported runners"
        required: false
        type: boolean
        default: false
jobs:
  discoverPackageBuilds:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'workflow_dispatch' && (inputs.buildAllPackages || inputs.packages != ''))
    runs-on: ubuntu-24.04
    outputs:
      hasPackages: ${{ steps.discover.outputs.hasPackages }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - id: discover
        env:
          BUILD_ALL_PACKAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.buildAllPackages }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PACKAGES: ${{ inputs.packages }}
        run: nix develop -c deno run --allow-env --allow-read --allow-run --allow-write="$GITHUB_OUTPUT" .github/ci/discoverCiPackageBuilds.ts
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - run: nix fmt -- --ci
      - run: nix develop -c actionlint
      - run: nix develop -c deno task check
      - run: nix develop -c deno task lint
      - run: nix develop -c deno task test
      - name: Realize bun2nix cache entry creator
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build --no-link --inputs-from . "bun2nix#packages.$system.cacheEntryCreator" --print-build-logs
      - run: nix flake check --no-build
  buildPackage:
    needs: discoverPackageBuilds
    if: needs.discoverPackageBuilds.outputs.hasPackages == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discoverPackageBuilds.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - run: nix build ".#checks.${{ matrix.system }}.${{ matrix.package }}" --print-build-logs
  packageBuildGate:
    needs:
      - discoverPackageBuilds
      - buildPackage
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'workflow_dispatch' && (inputs.buildAllPackages || inputs.packages != '')))
    runs-on: ubuntu-24.04
    steps:
      - run: |
          if [ "${{ needs.discoverPackageBuilds.result }}" != success ]; then
            echo "Package discovery failed"
            exit 1
          fi

          if [ "${{ needs.discoverPackageBuilds.outputs.hasPackages }}" = true ]; then
            if [ "${{ needs.buildPackage.result }}" != success ]; then
              echo "Package builds failed"
              exit 1
            fi
          else
            echo "No package builds required"
          fi
