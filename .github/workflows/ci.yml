name: CI
permissions:
  contents: read
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  merge_group:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      checks:
        description: "Space-separated checks.<system> attr names to activate across supported runners"
        required: false
        default: ""
      activateAllChecks:
        description: "Activate all checks.<system> attrs across supported runners"
        required: false
        type: boolean
        default: false
jobs:
  discoverChangeImpact:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.activateAllChecks || inputs.checks != ''))
    runs-on: ubuntu-24.04
    outputs:
      hasActivatedChecks: ${{ steps.discover.outputs.hasActivatedChecks }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      - id: discover
        env:
          ACTIVATE_ALL_CHECKS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.activateAllChecks) }}
          CHECKS: ${{ inputs.checks }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: nix develop -c deno run --allow-env --allow-read --allow-run --allow-write="$GITHUB_OUTPUT" .github/ci/impact.ts
  discoverQualityTarget:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      - id: matrix
        run: |
          matrix="$(nix shell .#deno -c deno eval 'import { SYSTEM_TARGETS } from "./lib/ts/system/target.ts"; console.log(JSON.stringify({ include: SYSTEM_TARGETS.map(({ runner, system }) => ({ runner, system })) }));')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
  checkQuality:
    needs: discoverQualityTarget
    name: "checkQuality (${{ matrix.runner }}, ${{ matrix.system }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discoverQualityTarget.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      - run: nix develop -c pre-commit run --all-files
      - name: Prepare bun2nix evaluation input
        run: nix build --no-link --inputs-from . "bun2nix#packages.${{ matrix.system }}.cacheEntryCreator" --print-build-logs
      - run: nix flake check --no-build
  enforceCoveragePolicy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      - run: nix develop -c deno task test:coverage
  check:
    needs:
      - checkQuality
      - enforceCoveragePolicy
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - run: |
          if [ "${{ needs.checkQuality.result }}" != success ] || [ "${{ needs.enforceCoveragePolicy.result }}" != success ]; then
            echo "Quality or coverage failed"
            exit 1
          fi
  buildActivatedCheck:
    needs: discoverChangeImpact
    if: needs.discoverChangeImpact.outputs.hasActivatedChecks == 'true'
    name: "buildActivatedCheck (${{ matrix.kind }}: ${{ matrix.name }}, ${{ matrix.runner }}, ${{ matrix.system }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discoverChangeImpact.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      - run: nix build ".#checks.${{ matrix.system }}.${{ matrix.name }}" --print-build-logs
  activatedCheckGate:
    needs:
      - discoverChangeImpact
      - buildActivatedCheck
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.activateAllChecks || inputs.checks != '')))
    runs-on: ubuntu-24.04
    steps:
      - run: |
          if [ "${{ needs.discoverChangeImpact.result }}" != success ]; then
            echo "Change impact discovery failed"
            exit 1
          fi

          if [ "${{ needs.discoverChangeImpact.outputs.hasActivatedChecks }}" = true ]; then
            if [ "${{ needs.buildActivatedCheck.result }}" != success ]; then
              echo "Activated check builds failed"
              exit 1
            fi
          else
            echo "No activated checks required"
          fi
