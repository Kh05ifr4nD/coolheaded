name: CI
permissions:
  contents: read
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".github/ci/**"
      - ".oxfmtrc.jsonc"
      - ".oxlintrc.jsonc"
      - "AGENTS.md"
      - "README.md"
      - "deno.jsonc"
      - "deno.lock"
      - "flake.nix"
      - "flake.lock"
      - "flake/**"
      - "lib/**"
      - "packages/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated check attrs to build across all supported Linux runners"
        required: false
        default: ""
      buildAllPackages:
        description: "Build all Linux check attrs on every supported Linux runner"
        required: false
        type: boolean
        default: false
jobs:
  discoverPackages:
    if: github.event_name == 'workflow_dispatch' && (inputs.buildAllPackages || inputs.packages != '')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - id: discover
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          systems='[
            {"system":"x86_64-linux","runner":"ubuntu-latest"},
            {"system":"aarch64-linux","runner":"ubuntu-24.04-arm"}
          ]'
          x86_64_linux_available="$(
            nix eval --json .#checks.x86_64-linux \
              | jq '[keys[] | select(. != "pre-commit" and . != "treefmt")]'
          )"
          aarch64_linux_available="$(
            nix eval --json .#checks.aarch64-linux \
              | jq '[keys[] | select(. != "pre-commit" and . != "treefmt")]'
          )"
          available_union="$(
            jq -cn \
              --argjson x86 "$x86_64_linux_available" \
              --argjson arm "$aarch64_linux_available" \
              '$x86 + $arm | unique'
          )"
          if [ -n "$PACKAGES" ]; then
            requested="$(
              jq -cn --arg packages "$PACKAGES" '
                $packages | split(" ") | map(select(length > 0)) | unique
              '
            )"
            missing="$(
              jq -cn \
                --argjson requested "$requested" \
                --argjson available "$available_union" \
                '$requested - $available'
            )"
            if [ "$(jq 'length' <<<"$missing")" -gt 0 ]; then
              echo "unknown check attrs: $(jq -r 'join(", ")' <<<"$missing")" >&2
              exit 1
            fi
          else
            requested="$available_union"
          fi
          matrix="$(
            jq -cn \
              --argjson systems "$systems" \
              --argjson requested "$requested" \
              --argjson x86 "$x86_64_linux_available" \
              --argjson arm "$aarch64_linux_available" '
                {
                  include: [
                    $systems[] as $target
                    | (
                        if $target.system == "x86_64-linux" then $x86 else $arm end
                      ) as $available
                    | $requested[]
                    | select($available | index(.))
                    | {
                        system: $target.system,
                        runner: $target.runner,
                        package: .
                      }
                  ]
                }
              '
          )"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - run: nix fmt -- --ci
      - run: nix develop -c deno task check
      - run: nix develop -c deno task lint
      - run: nix develop -c deno task test
      - name: Realize bun2nix cache entry creator
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build --no-link --inputs-from . "bun2nix#packages.$system.cacheEntryCreator" --print-build-logs
      - run: nix flake check --no-build
  buildPackages:
    needs: discoverPackages
    if: github.event_name == 'workflow_dispatch' && (inputs.buildAllPackages || inputs.packages != '')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discoverPackages.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - run: nix build ".#checks.${{ matrix.system }}.${{ matrix.package }}" --print-build-logs
