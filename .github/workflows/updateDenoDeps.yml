name: Update Deno Dependencies
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      autoMerge:
        required: false
        type: boolean
        default: true
    secrets:
      APP_PRIVATE_KEY:
        required: true
      APP_ID:
        required: true
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: cachix/install-nix-action@v31
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: nix develop -c deno run --allow-run .github/ci/prepareUpdateBranch.ts update/denoDeps
      - id: update
        run: nix develop -c deno task update:deno-deps
      - if: steps.update.outputs.updated == 'true'
        run: nix develop -c deno task check
      - if: steps.update.outputs.updated == 'true'
        run: nix develop -c deno task lint
      - if: steps.update.outputs.updated == 'true'
        run: nix develop -c deno task test
      - if: steps.update.outputs.updated == 'true'
        name: Realize bun2nix cache entry creator
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build --no-link --inputs-from . "bun2nix#packages.$system.cacheEntryCreator" --print-build-logs
      - if: steps.update.outputs.updated == 'true'
        run: nix flake check --print-build-logs
      - if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          nix develop -c deno run --allow-env --allow-run .github/ci/createUpdatePr.ts \
            --branch update/denoDeps \
            --title "deno.lock: update dependencies" \
            --body "${{ steps.update.outputs.changelog }}" \
            --labels "dependencies,automated,deno-deps" \
            --auto-merge "${{ inputs.autoMerge }}"
