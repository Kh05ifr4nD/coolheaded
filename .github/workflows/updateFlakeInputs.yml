name: Update Flake Inputs
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      inputs:
        required: false
        type: string
        default: ""
      autoMerge:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      inputs:
        description: "Space-separated flake inputs"
        required: false
        default: ""
      autoMerge:
        description: "Enable GitHub auto-merge"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 4 * * *"
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      hasUpdates: ${{ steps.discover.outputs.hasUpdates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Require update token
        env:
          COOLHEADED_UPDATE_TOKEN: ${{ secrets.COOLHEADED_UPDATE_TOKEN }}
        run: |
          test -n "$COOLHEADED_UPDATE_TOKEN" || {
            echo "COOLHEADED_UPDATE_TOKEN repository secret is required"
            exit 1
          }
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - id: discover
        env:
          INPUTS: ${{ inputs.inputs }}
        run: nix develop -c deno run --allow-env --allow-read --allow-write .github/ci/discoverFlakeInputUpdates.ts
  update:
    needs: discover
    if: needs.discover.outputs.hasUpdates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Require update secrets
        env:
          COOLHEADED_UPDATE_TOKEN: ${{ secrets.COOLHEADED_UPDATE_TOKEN }}
        run: |
          test -n "$COOLHEADED_UPDATE_TOKEN" || {
            echo "COOLHEADED_UPDATE_TOKEN repository secret is required"
            exit 1
          }
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.COOLHEADED_UPDATE_TOKEN }}
      - uses: cachix/install-nix-action@v31
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: nix develop -c deno run --allow-run .github/ci/prepareUpdateBranch.ts "update/flakeInput/${{ matrix.name }}"
      - id: update
        run: nix develop -c deno run --allow-env --allow-read --allow-run --allow-write .github/ci/runFlakeInputUpdate.ts "${{ matrix.name }}"
      - if: steps.update.outputs.updated == 'true'
        name: Realize bun2nix cache entry creator
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build --no-link --inputs-from . "bun2nix#packages.$system.cacheEntryCreator" --print-build-logs
      - if: steps.update.outputs.updated == 'true'
        run: nix flake check --print-build-logs
      - if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.COOLHEADED_UPDATE_TOKEN }}
        run: |
          nix develop -c deno run --allow-env --allow-run .github/ci/createUpdatePr.ts \
            --branch "update/flakeInput/${{ matrix.name }}" \
            --title "flake.lock: update ${{ matrix.name }}" \
            --body "Automated flake input update for ${{ matrix.name }} from ${{ matrix.currentVersion }} to ${{ steps.update.outputs.newVersion }}." \
            --labels "dependencies,automated,flake-input" \
            --auto-merge "${{ inputs.autoMerge }}"
