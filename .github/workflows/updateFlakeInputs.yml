name: Update Flake Inputs
on:
  workflow_call:
    inputs:
      inputs:
        required: false
        type: string
        default: ""
      autoMerge:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      inputs:
        description: "Space-separated flake inputs"
        required: false
        default: ""
      autoMerge:
        description: "Enable GitHub auto-merge"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 4 * * *"
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      hasUpdates: ${{ steps.discover.outputs.hasUpdates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: discover
        env:
          INPUTS: ${{ inputs.inputs }}
        run: deno run --allow-env --allow-read .github/ci/discoverFlakeInputUpdates.ts
  update:
    needs: discover
    if: needs.discover.outputs.hasUpdates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: deno run --allow-run .github/ci/prepareUpdateBranch.ts "update/flakeInput/${{ matrix.name }}"
      - id: update
        run: deno run --allow-env --allow-read --allow-run --allow-write .github/ci/runFlakeInputUpdate.ts "${{ matrix.name }}"
      - if: steps.update.outputs.updated == 'true'
        run: nix flake check --print-build-logs
      - if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          nix develop -c deno run --allow-env --allow-run .github/ci/createUpdatePr.ts \
            --branch "update/flakeInput/${{ matrix.name }}" \
            --title "flake.lock: update ${{ matrix.name }}" \
            --body "Automated flake input update for ${{ matrix.name }} from ${{ matrix.currentVersion }} to ${{ steps.update.outputs.newVersion }}." \
            --labels "dependencies,automated,flake-input" \
            --auto-merge "${{ inputs.autoMerge }}"
