name: Update Packages
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      packages:
        required: false
        type: string
        default: ""
      autoMerge:
        required: false
        type: boolean
        default: true
    secrets:
      APP_PRIVATE_KEY:
        required: true
      APP_ID:
        required: true
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      hasUpdates: ${{ steps.discover.outputs.hasUpdates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - id: discover
        env:
          PACKAGES: ${{ inputs.packages }}
        run: nix develop -c deno run --allow-env --allow-run --allow-write .github/ci/discoverPackageUpdates.ts
  update:
    needs: discover
    if: needs.discover.outputs.hasUpdates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: cachix/install-nix-action@v31
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: nix develop -c deno run --allow-run .github/ci/prepareUpdateBranch.ts "update/package/${{ matrix.name }}"
      - id: update
        run: nix develop -c deno run --allow-env --allow-net --allow-read --allow-run --allow-write .github/ci/runPackageUpdate.ts "${{ matrix.name }}"
      - if: steps.update.outputs.updated == 'true'
        run: nix build ".#${{ matrix.name }}"
      - if: steps.update.outputs.updated == 'true'
        run: nix develop -c deno task check
      - if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cat > body.md <<'EOF'
          Automated package update for ${{ matrix.name }} from ${{ matrix.currentVersion }} to ${{ steps.update.outputs.newVersion }}.
          EOF
          if [ -n "${{ steps.update.outputs.changelog }}" ]; then
            printf '\n%s\n' "${{ steps.update.outputs.changelog }}" >> body.md
          fi
          nix develop -c deno run --allow-env --allow-run .github/ci/createUpdatePr.ts \
            --branch "update/package/${{ matrix.name }}" \
            --title "${{ matrix.name }}: ${{ matrix.currentVersion }} -> ${{ steps.update.outputs.newVersion }}" \
            --body "$(cat body.md)" \
            --labels "dependencies,automated,package" \
            --auto-merge "${{ inputs.autoMerge }}"
