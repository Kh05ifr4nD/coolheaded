name: Update Dependencies
permissions:
  contents: read
concurrency:
  group: update-dependencies
  cancel-in-progress: false
on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package attrs"
        required: false
        default: ""
      inputs:
        description: "Space-separated flake inputs"
        required: false
        default: ""
      updatePackages:
        required: false
        type: boolean
        default: true
      updateFlakeInputs:
        required: false
        type: boolean
        default: true
      updateDenoDeps:
        required: false
        type: boolean
        default: true
      autoMerge:
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 0,4,18,21 * * *"
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      hasUpdates: ${{ steps.discover.outputs.hasUpdates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - id: discover
        env:
          INPUTS: ${{ inputs.inputs }}
          PACKAGES: ${{ inputs.packages }}
          UPDATE_DENO_DEPS: ${{ github.event_name != 'workflow_dispatch' || inputs.updateDenoDeps != false }}
          UPDATE_FLAKE_INPUTS: ${{ github.event_name != 'workflow_dispatch' || inputs.updateFlakeInputs != false }}
          UPDATE_PACKAGES: ${{ github.event_name != 'workflow_dispatch' || inputs.updatePackages != false }}
        run: nix develop -c deno run --allow-env --allow-read --allow-run --allow-write .github/ci/discoverUpdates.ts
  update:
    needs: discover
    if: needs.discover.outputs.hasUpdates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: cachix/install-nix-action@v31
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare update branch
        env:
          UPDATE_BRANCH: ${{ matrix.type == 'package' && format('update/package/{0}', matrix.name) || matrix.type == 'flake-input' && format('update/flakeInput/{0}', matrix.name) || 'update/denoDeps' }}
        run: nix develop -c deno run --allow-run .github/ci/prepareUpdateBranch.ts "$UPDATE_BRANCH"
      - id: update
        name: Run update
        run: |
          case "${{ matrix.type }}" in
            package)
              nix develop -c deno run --allow-env --allow-net --allow-read --allow-run --allow-write .github/ci/runPackageUpdate.ts "${{ matrix.name }}"
              ;;
            flake-input)
              nix develop -c deno run --allow-env --allow-read --allow-run --allow-write .github/ci/runFlakeInputUpdate.ts "${{ matrix.name }}"
              ;;
            deno-deps)
              nix develop -c deno task update:deno-deps
              ;;
          esac
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'package'
        run: nix build ".#${{ matrix.name }}"
      - if: steps.update.outputs.updated == 'true' && matrix.type != 'package'
        name: Realize bun2nix cache entry creator
        run: |
          system="$(nix eval --impure --raw --expr builtins.currentSystem)"
          nix build --no-link --inputs-from . "bun2nix#packages.$system.cacheEntryCreator" --print-build-logs
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'flake-input'
        run: nix flake check --print-build-logs
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'deno-deps'
        run: nix develop -c deno task check
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'deno-deps'
        run: nix develop -c deno task lint
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'deno-deps'
        run: nix develop -c deno task test
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'deno-deps'
        run: nix flake check --print-build-logs
      - if: steps.update.outputs.updated == 'true' && matrix.type == 'package'
        run: nix develop -c deno task check
      - if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UPDATE_BRANCH: ${{ matrix.type == 'package' && format('update/package/{0}', matrix.name) || matrix.type == 'flake-input' && format('update/flakeInput/{0}', matrix.name) || 'update/denoDeps' }}
          UPDATE_BODY: ${{ matrix.type == 'package' && format('Automated package update for {0} from {1} to {2}.', matrix.name, matrix.currentVersion, steps.update.outputs.newVersion) || matrix.type == 'flake-input' && format('Automated flake input update for {0} from {1} to {2}.', matrix.name, matrix.currentVersion, steps.update.outputs.newVersion) || steps.update.outputs.changelog }}
          UPDATE_CHANGELOG: ${{ steps.update.outputs.changelog }}
          UPDATE_LABELS: ${{ matrix.type == 'package' && 'dependencies,automated,package' || matrix.type == 'flake-input' && 'dependencies,automated,flake-input' || 'dependencies,automated,deno-deps' }}
          UPDATE_TITLE: >-
            ${{ matrix.type == 'package' && format('{0}: {1} -> {2}', matrix.name, matrix.currentVersion, steps.update.outputs.newVersion) || matrix.type == 'flake-input' && format('flake.lock: update {0}', matrix.name) || 'deno.lock: update dependencies' }}
        run: |
          body="$UPDATE_BODY"
          if [ -n "$UPDATE_CHANGELOG" ] && [ "${{ matrix.type }}" = package ]; then
            body="$body"$'\n\n'"$UPDATE_CHANGELOG"
          fi
          nix develop -c deno run --allow-env --allow-run .github/ci/createUpdatePr.ts \
            --branch "$UPDATE_BRANCH" \
            --title "$UPDATE_TITLE" \
            --body "$body" \
            --labels "$UPDATE_LABELS" \
            --auto-merge "${{ github.event_name != 'workflow_dispatch' || inputs.autoMerge != false }}"
  summary:
    needs: [discover, update]
    runs-on: ubuntu-latest
    if: always() && needs.discover.outputs.hasUpdates == 'true'
    steps:
      - run: |
          echo "## Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.update.result }}" = failure ]; then
            echo "Some update jobs failed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All update jobs completed." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Auto-merge: ${{ github.event_name != 'workflow_dispatch' || inputs.autoMerge != false }}" >> "$GITHUB_STEP_SUMMARY"
