name: Update
permissions:
  contents: read
concurrency:
  group: update
  cancel-in-progress: false
on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package attrs"
        required: false
        default: ""
      inputs:
        description: "Space-separated flake inputs"
        required: false
        default: ""
      updatePackages:
        required: false
        type: boolean
        default: true
      updateFlakeInputs:
        required: false
        type: boolean
        default: true
      updateDenoDependencies:
        required: false
        type: boolean
        default: true
      autoMerge:
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 0,12 * * *"
jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      hasUpdates: ${{ steps.discover.outputs.hasUpdates }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
      - id: discover
        env:
          INPUTS: ${{ inputs.inputs }}
          PACKAGES: ${{ inputs.packages }}
          UPDATE_DENO_DEPENDENCIES: ${{ github.event_name != 'workflow_dispatch' || inputs.updateDenoDependencies != false }}
          UPDATE_FLAKE_INPUTS: ${{ github.event_name != 'workflow_dispatch' || inputs.updateFlakeInputs != false }}
          UPDATE_PACKAGES: ${{ github.event_name != 'workflow_dispatch' || inputs.updatePackages != false }}
        run: nix develop -c deno run --allow-env --allow-read --allow-run --allow-write .github/ci/update/discover.ts
  update:
    needs: discover
    if: needs.discover.outputs.hasUpdates == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: cachix/install-nix-action@v31
      - run: |
          git config user.name "kh05ifr4nd-coolheaded[bot]"
          git config user.email "292306314+kh05ifr4nd-coolheaded[bot]@users.noreply.github.com"
      - name: Prepare update branch
        env:
          UPDATE_BRANCH: ${{ matrix.kind == 'package' && format('update/package/{0}', matrix.name) || matrix.kind == 'flakeInput' && format('update/flakeInput/{0}', matrix.name) || 'update/denoDependencies' }}
        run: nix develop -c deno run --allow-run .github/ci/update/branch.ts "$UPDATE_BRANCH"
      - id: update
        name: Run update
        env:
          CURRENT_VERSION: ${{ matrix.currentVersion }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          case "${{ matrix.kind }}" in
            package)
              nix develop -c deno run --allow-env --allow-net --allow-read --allow-run --allow-write .github/ci/update/run/package.ts "${{ matrix.name }}"
              ;;
            flakeInput)
              nix develop -c deno run --allow-env --allow-read --allow-run --allow-write .github/ci/update/run/flakeInput.ts "${{ matrix.name }}"
              ;;
            denoDependencies)
              nix develop -c deno task update:denoDependencies
              ;;
          esac
      - if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UPDATE_BRANCH: ${{ matrix.kind == 'package' && format('update/package/{0}', matrix.name) || matrix.kind == 'flakeInput' && format('update/flakeInput/{0}', matrix.name) || 'update/denoDependencies' }}
          UPDATE_BODY: ${{ matrix.kind == 'package' && format('Automated package update for {0} from {1} to {2}.', matrix.name, matrix.currentVersion, steps.update.outputs.newVersion) || matrix.kind == 'flakeInput' && format('Automated flake input update for {0} from {1} to {2}.', matrix.name, matrix.currentVersion, steps.update.outputs.newVersion) || steps.update.outputs.changelog }}
          UPDATE_CHANGELOG: ${{ steps.update.outputs.changelog }}
          UPDATE_LABELS: ${{ matrix.kind == 'package' && 'dependencies,automated,package' || matrix.kind == 'flakeInput' && 'dependencies,automated,flakeInput' || 'dependencies,automated,denoDependencies' }}
          UPDATE_TITLE: >-
            ${{ matrix.kind == 'package' && format('{0}: {1} -> {2}', matrix.name, matrix.currentVersion, steps.update.outputs.newVersion) || matrix.kind == 'flakeInput' && format('flake.lock: update {0}', matrix.name) || 'deno.lock: update Deno dependencies' }}
        run: |
          body="$UPDATE_BODY"
          if [ -n "$UPDATE_CHANGELOG" ] && [ "${{ matrix.kind }}" = package ]; then
            body="$body"$'\n\n'"$UPDATE_CHANGELOG"
          fi
          nix develop -c deno run --allow-env --allow-run .github/ci/update/pullRequest.ts \
            --branch "$UPDATE_BRANCH" \
            --title "$UPDATE_TITLE" \
            --body "$body" \
            --labels "$UPDATE_LABELS" \
            --auto-merge "${{ github.event_name != 'workflow_dispatch' || inputs.autoMerge != false }}"
  summary:
    needs: [discover, update]
    runs-on: ubuntu-24.04
    if: always() && needs.discover.outputs.hasUpdates == 'true'
    steps:
      - run: |
          echo "## Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.update.result }}" = failure ]; then
            echo "Some update jobs failed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All update jobs completed." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Auto-merge: ${{ github.event_name != 'workflow_dispatch' || inputs.autoMerge != false }}" >> "$GITHUB_STEP_SUMMARY"
